          - {label: "Orange Bullet", value: "/assets/images/logos/Bullet Orange.png"}
          - {label: "Pink / Red Bullet", value: "/assets/images/logos/Bullet Pink.png"}
          - {label: "Purple Bullet", value: "/assets/images/logos/Bullet Purple.png"}
          - {label: "Green Bullet", value: "/assets/images/logos/Bullet Green.png"}
          - {label: "Rust Bullet (default for Civil)", value: "/assets/images/logos/Bullet Rust.png"}
          - {label: "Magenta Bullet", value: "/assets/images/logos/Bullet Magenta.png"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  # ── FACILITY SERVICES ─────────────────────────────────
  - name: "facility-services"
