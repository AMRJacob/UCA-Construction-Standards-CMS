backend:
  name: github
  repo: AMRJacob/UCA-Construction-Standards-CMS
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

# ─────────────────────────────────────────────────────────
# SHARED FIELD DEFINITIONS (referenced via anchors)
# ─────────────────────────────────────────────────────────

collections:

  # ── NAVIGATION STRUCTURE ──────────────────────────────
  # Edit top-level categories: name, icon, color, bullet
  - name: "site-navigation"
    label: "⚙️ Navigation Sections"
    description: "Manage the top-level sections in the sidebar navigation. Add new sections, upload icons, and set colors here."
    files:
      - label: "Navigation Structure"
        name: "navigation"
        file: "_data/navigation.yml"
        fields:
          - label: "Sections"
            name: "sections"
            widget: "list"
            label_singular: "Section"
            summary: "{{fields.name}}"
            fields:
              - label: "Display Name"
                name: "name"
                widget: "string"
                hint: "Full name shown in the sidebar, e.g. CIVIL AND LANDSCAPE REQUIREMENTS"
              - label: "URL Key"
                name: "key"
                widget: "string"
                hint: "Short slug used in URLs and in each page's Section field. Lowercase, hyphens only. e.g. civil-landscape"
              - label: "Section Icon"
                name: "icon"
                widget: "image"
                media_folder: "/assets/images/logos"
                public_folder: "/assets/images/logos"
                hint: "Icon shown next to the section name. Upload a new image or reuse an existing one."
              - label: "Section Color"
                name: "color"
                widget: "select"
                hint: "Color used for this section's links in the navigation sidebar."
                options:
                  - {label: "Blue — Architectural", value: "plumbing-blue"}
                  - {label: "Orange — Instructions", value: "hvac-orange"}
                  - {label: "Red — Procurement / General", value: "fire-red"}
                  - {label: "Purple — Facility Services / UCA brand", value: "uca-purple"}
                  - {label: "Green — Sustainable Compliance", value: "sustainable-green"}
                  - {label: "Brown — Civil / Landscape", value: "civil-rust"}
              - label: "Default Bullet Image"
                name: "bullet"
                widget: "select"
                hint: "Bullet icon used by default for sub-pages in this section."
                options:
                  - {label: "Blue Bullet", value: "/assets/images/logos/Bullet Blue.png"}
                  - {label: "Orange Bullet", value: "/assets/images/logos/Bullet Orange.png"}
                  - {label: "Pink / Red Bullet", value: "/assets/images/logos/Bullet Pink.png"}
                  - {label: "Purple Bullet", value: "/assets/images/logos/Bullet Purple.png"}
                  - {label: "Green Bullet", value: "/assets/images/logos/Bullet Green.png"}
                  - {label: "Rust Bullet", value: "/assets/images/logos/Bullet Rust.png"}
                  - {label: "Magenta Bullet", value: "/assets/images/logos/Bullet Magenta.png"}

  # ── INSTRUCTIONS ─────────────────────────────────────
  - name: "instructions"
    label: "Instructions"
    folder: "_standards/instructions"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Section", name: "section", widget: "hidden", default: "instructions"}
      - {label: "Permalink", name: "permalink", widget: "string", required: false, hint: "URL path, e.g. /standards/instructions/my-page/"}
      - label: "Nav Color"
        name: "nav_color"
        widget: "select"
        required: false
        hint: "Color of this page in the sidebar. Leave blank to use the section default (Orange)."
        options:
          - {label: "Blue — Architectural", value: "plumbing-blue"}
          - {label: "Orange — Instructions (default)", value: "hvac-orange"}
          - {label: "Red — Procurement / General", value: "fire-red"}
          - {label: "Purple — Facility / UCA brand", value: "uca-purple"}
          - {label: "Green — Sustainable", value: "sustainable-green"}
          - {label: "Brown — Civil / Landscape", value: "civil-rust"}
      - label: "Bullet Image"
        name: "bullet"
        widget: "select"
        required: false
        hint: "Bullet icon for this page in the sidebar. Leave blank to use the section default."
        options:
          - {label: "Blue Bullet", value: "/assets/images/logos/Bullet Blue.png"}
          - {label: "Orange Bullet (default for Instructions)", value: "/assets/images/logos/Bullet Orange.png"}
          - {label: "Pink / Red Bullet", value: "/assets/images/logos/Bullet Pink.png"}
          - {label: "Purple Bullet", value: "/assets/images/logos/Bullet Purple.png"}
          - {label: "Green Bullet", value: "/assets/images/logos/Bullet Green.png"}
          - {label: "Rust Bullet", value: "/assets/images/logos/Bullet Rust.png"}
          - {label: "Magenta Bullet", value: "/assets/images/logos/Bullet Magenta.png"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

