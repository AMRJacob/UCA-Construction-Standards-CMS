          - {label: "Orange — Instructions", value: "hvac-orange"}
          - {label: "Red — Procurement / General (default)", value: "fire-red"}
          - {label: "Purple — Facility / UCA brand", value: "uca-purple"}
          - {label: "Green — Sustainable", value: "sustainable-green"}
          - {label: "Brown — Civil / Landscape", value: "civil-rust"}
      - label: "Bullet Image"
        name: "bullet"
        widget: "select"
        required: false
        hint: "Bullet icon for this page in the sidebar. Leave blank to use the section default."
        options:
          - {label: "Blue Bullet", value: "/assets/images/logos/Bullet Blue.png"}
          - {label: "Orange Bullet", value: "/assets/images/logos/Bullet Orange.png"}
          - {label: "Pink / Red Bullet (default for Procurement)", value: "/assets/images/logos/Bullet Pink.png"}
          - {label: "Purple Bullet", value: "/assets/images/logos/Bullet Purple.png"}
          - {label: "Green Bullet", value: "/assets/images/logos/Bullet Green.png"}
          - {label: "Rust Bullet", value: "/assets/images/logos/Bullet Rust.png"}
          - {label: "Magenta Bullet", value: "/assets/images/logos/Bullet Magenta.png"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

