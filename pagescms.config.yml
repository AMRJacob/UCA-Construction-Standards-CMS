backend:
 name: github
 repo: YOUR_GITHUB_USERNAME/UCA-Construction-Standards
 branch: main
 auth:
   type: implicit

site:
 name: UCA Construction Standards

collections:
 - name: "standards"
   label: "Construction Standards"
   folder: "_standards"
   create: true
   slug: "{{path}}"
   fields:
     - { name: "layout", label: "Layout", widget: "string", default: "default" }
     - { name: "title", label: "Title", widget: "string" }
     - { name: "permalink", label: "Permalink", widget: "string" }
     - { name: "tags", label: "Tags", widget: "list" }
     - { name: "body", label: "Content", widget: "markdown" }
