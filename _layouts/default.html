<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <style>
    /* UCA Brand Colors */
    :root {
      --uca-purple: #4b2e83;
      --uca-gray: #63666a;
      --fire-red: #c8102e;
      --plumbing-blue: #0067b9;
      --hvac-orange: #ff8200;
      --electrical-yellow: #ffd100;
      --site-green: #00a651;
      --sustainable-green: #2e7d32;
      --procurement-navy: #003057;
      --general-teal: #008b8b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333;
    }

    .site-header {
      background-color: var(--uca-purple);
      padding: 15px 0;
      border-bottom: 4px solid #333;
    }

    .site-header .wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
    }

    .site-header img {
      height: 50px;
      width: auto;
      margin-right: 20px;
    }

    .site-header h1 {
      margin: 0;
      font-size: 1.8em;
      color: white;
    }

    .site-header h1 a {
      color: white;
      text-decoration: none;
    }

    .site-header h1 a:hover {
      text-decoration: underline;
    }

    .site-content {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .sidebar {
      width: 280px;
      padding: 20px;
      background-color: #f8f9fa;
      border-right: 2px solid #e0e0e0;
      position: sticky;
      top: 20px;
      height: fit-content;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    .sidebar-logo {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--uca-purple);
    }

    .sidebar-logo img {
      max-width: 200px;
      height: auto;
    }

    .sidebar h3 {
      color: var(--uca-purple);
      font-size: 1.1em;
      margin-bottom: 15px;
      margin-top: 25px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sidebar nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sidebar nav li {
      margin-bottom: 8px;
    }

    .sidebar nav li a {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      color: #333;
      text-decoration: none;
      border-radius: 5px;
      transition: all 0.3s ease;
      border-left: 4px solid transparent;
    }

    .sidebar nav li a:hover {
      background-color: #e8e9ea;
      border-left-color: var(--uca-purple);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .sidebar nav a[href*="instructions"]:hover {
      background-color: rgba(75, 46, 131, 0.1);
      border-left-color: var(--uca-purple);
    }

    .sidebar nav a[href*="procurement"]:hover {
      background-color: rgba(0, 48, 87, 0.1);
      border-left-color: var(--procurement-navy);
    }

    .sidebar nav a[href*="general-requirements"]:hover {
      background-color: rgba(0, 139, 139, 0.1);
      border-left-color: var(--general-teal);
    }

    .sidebar nav a[href*="facility-construction"]:hover {
      background-color: rgba(99, 102, 106, 0.1);
      border-left-color: var(--uca-gray);
    }

    .sidebar nav a[href*="facility-services"]:hover {
      background-color: rgba(255, 130, 0, 0.1);
      border-left-color: var(--hvac-orange);
    }

    .sidebar nav a[href*="site-work"]:hover {
      background-color: rgba(0, 166, 81, 0.1);
      border-left-color: var(--site-green);
    }

    .sidebar nav a[href*="sustainable"]:hover {
      background-color: rgba(46, 125, 50, 0.1);
      border-left-color: var(--sustainable-green);
    }

    .main-content {
      flex: 1;
      padding: 20px 40px;
      min-width: 0;
    }

    .page-header {
      border-left: 6px solid var(--uca-purple);
      padding-left: 20px;
      margin-bottom: 30px;
    }

    .page-header h1 {
      margin: 0;
      color: #333;
    }

    body.instructions .page-header {
      border-left-color: var(--uca-purple);
    }

    body.procurement .page-header {
      border-left-color: var(--procurement-navy);
    }

    body.general-requirements .page-header {
      border-left-color: var(--general-teal);
    }

    body.facility-construction .page-header {
      border-left-color: var(--uca-gray);
    }

    body.facility-services .page-header {
      border-left-color: var(--hvac-orange);
    }

    body.site-work .page-header {
      border-left-color: var(--site-green);
    }

    body.sustainable-compliance .page-header {
      border-left-color: var(--sustainable-green);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
    }

    table th {
      background-color: var(--uca-purple);
      color: white;
      padding: 12px;
      text-align: left;
      border: 1px solid #ddd;
    }

    table td {
      padding: 10px;
      border: 1px solid #ddd;
    }

    table tr:nth-child(even) {
      background-color: #f8f9fa;
    }

    .site-footer {
      background-color: #333;
      color: white;
      padding: 20px 0;
      margin-top: 50px;
      text-align: center;
    }

    .site-footer .wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    #feedback-form {
      background-color: #f8f9fa;
      padding: 20px;
      border-radius: 5px;
      margin-top: 40px;
    }

    #feedback-form h2 {
      margin-top: 0;
      color: var(--uca-purple);
    }

    a {
      color: var(--uca-purple);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h1, h2, h3, h4, h5, h6 {
      color: #333;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }

    h1 {
      font-size: 2em;
    }

    h2 {
      font-size: 1.5em;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 10px;
    }

    h3 {
      font-size: 1.3em;
    }

    ul, ol {
      margin: 1em 0;
      padding-left: 2em;
    }

    code {
      background-color: #f8f9fa;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }

    pre {
      background-color: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
    }

    @media (max-width: 968px) {
      .site-content {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        position: relative;
        margin-bottom: 30px;
        max-height: none;
      }
      
      .main-content {
        padding: 20px;
      }
    }

    @media print {
      .sidebar {
        display: none;
      }
      
      .site-header {
        background-color: white;
        border-bottom: 2px solid #333;
      }
      
      .site-header h1 a {
        color: #333;
      }
      
      .main-content {
        padding: 0;
      }
      
      #feedback-form {
        display: none;
      }
    }
  </style>
</head>
<body class="{{ page.title | slugify }}">
  
  <header class="site-header">
    <div class="wrapper">
      <img src="{{ '/assets/images/logos/logo-header.png' | relative_url }}" alt="UCA Logo">
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
    </div>
  </header>

  <div class="site-content">
    
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="{{ '/assets/images/logos/logo-full.png' | relative_url }}" alt="UCA Construction Standards">
      </div>
      
      <nav>
        <aside class="sidebar">
  <div class="sidebar-logo">
    <img src="{{ '/assets/images/logos/logo-full.png' | relative_url }}" alt="UCA Construction Standards">
  </div>
  
  <nav>
    <!-- OLD NAVIGATION IS HERE - REPLACE EVERYTHING BETWEEN <nav> and </nav> -->
  </nav>
</aside>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>{{ page.title }}</h1>
      </div>
      
      {{ content }}
      
      <hr style="margin-top: 50px;">
      <div id="feedback-form">
        <h2>Feedback</h2>
        <p>Have suggestions or found an error? <a href="https://github.com/AMRJacob/UCA-Construction-Standards/issues/new?title=Feedback for {{ page.title }}&body=Page: {{ page.url }}" target="_blank">Submit feedback on GitHub</a></p>
      </div>
    </main>

  </div>

  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; {{ site.time | date: '%Y' }} University of Central Arkansas Physical Plant</p>
    </div>
  </footer>

<script>
    // Toggle expandable menu
    document.querySelectorAll('.has-submenu > .parent-link').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const parent = this.parentElement;
        parent.classList.toggle('expanded');
        
        // Navigate to main page if clicking on already expanded menu
        if (!parent.classList.contains('expanded')) {
          window.location.href = this.href;
        }
      });
    });
    
    // Auto-expand if we're on a sub-page
    const currentPath = window.location.pathname;
    document.querySelectorAll('.submenu a').forEach(link => {
      if (currentPath.includes(link.getAttribute('href'))) {
        link.closest('.has-submenu').classList.add('expanded');
        link.style.backgroundColor = 'rgba(75, 46, 131, 0.1)';
      }
    });
  </script>


</body>
</html>
